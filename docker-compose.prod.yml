# DevLens single-box production deployment (private alpha).
# All services run on one host behind Caddy, which terminates TLS and enforces
# Basic Auth. The Next.js frontend proxies /api/v1 to the backend internally, so
# only Caddy is exposed to the internet (ports 80/443).
#
# Usage (on the host, from the repo root):
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
name: devlens

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devlens}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-devlens}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - .env.prod
    # Reranker off keeps torch/sentence-transformers out of the runtime path so
    # the box stays light; dense + lexical fusion still runs.
    environment:
      RERANKER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ./workers
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-next
    environment:
      # Server-side proxy target (container-to-container); browsers use same-origin /api/v1.
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DEVLENS_DOMAIN: ${DEVLENS_DOMAIN}
      DEVLENS_TLS_EMAIL: ${DEVLENS_TLS_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/alpha_users:/etc/caddy/alpha_users:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  caddy_data:
  caddy_config:
